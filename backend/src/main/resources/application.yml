server:
  port: ${SERVER_PORT:8080}

# Chat (/api/chat): optional system prompt override (leave blank to use built-in default in Java).
app:
  chat:
    system-instruction: ""
  fetch-url:
    max-response-chars: 12000
    max-download-bytes: 2000000
    connect-timeout-ms: 5000
    read-timeout-ms: 15000
    allow-http: false
    # Log returned text at INFO (first N chars; 0 = log only character count).
    log-response-max-chars: 8192

# Tavily: set TAVILY_API_KEY in environment or repo-root .env (Docker Compose loads .env).
# Optional tuning (no secrets here):
tavily:
  max-results: 5
  search-depth: basic

spring:
  application:
    name: spring-ai-backend
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5:3b}
          # Ollama context (tokens). Qwen2.5 3B GGUF context_length=32768; lower OLLAMA_NUM_CTX if VRAM/RAM is tight.
          num-ctx: ${OLLAMA_NUM_CTX:32768}
  devtools:
    restart:
      enabled: true
